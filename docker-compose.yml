services:
  bot:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: mw_tarot_bot
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs:rw
      - ./images/tarot:/app/images/tarot:ro
      - ./data:/app/data:rw
      - ./tests:/app/tests:ro
    env_file:
      - .env
    environment:
      - TZ=Europe/Moscow
      - PYTHONUNBUFFERED=1
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service_name"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge
